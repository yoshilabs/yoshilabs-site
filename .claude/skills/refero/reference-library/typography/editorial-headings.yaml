# Editorial Heading Systems
# Use for: creative agencies, salons, law firms, editorial content, hospitality
# Principles: Light weight (300-400) for display. Negative tracking (-0.02em).
# Serif or humanist sans for headlines. Generous line-height (1.1-1.2).
# Never bold headings. Never centered body text. Never tight tracking.

systems:
  - source: ElevenLabs
    north_star: "Architect's blueprint on warm vellum — Waldenburg weight-300 headlines at 48px with -0.02em tracking anchored against an"
    fonts: ['Waldenburg', 'WaldenburgFH', 'Inter', 'Geist Mono']
    rules:
      - "Headings at 300 weight with -0.02em tracking"
      - "Inter for headings — geometric, clean, modern"
      - "Line-height 1.1-1.25 on all headings"
      - "Never bold. Light weight = editorial confidence"
