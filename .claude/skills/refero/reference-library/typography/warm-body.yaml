# Warm Body Text Systems
# Use for: restaurants, bakeries, cafes, dental clinics, medical practices
# Principles: Readable, warm, human. 16px+ body size. Generous line-height (1.6-1.75).
# System fonts or clean sans for body. Display serif for headings.
# Never below 14px body. Never tight line-height. Never all-caps body.

systems:
  - source: ElevenLabs
    fonts: ['Waldenburg', 'WaldenburgFH', 'Inter', 'Geist Mono']
    body_rules:
      - "Min 16px body. Ideal: clamp(1rem, 1.1vw, 1.125rem)"
      - "Line-height: 1.65-1.75 for body paragraphs"
      - "Left-aligned body. Never justified or centered."
      - "400 weight body. 500 for emphasis. Never bold paragraphs."
