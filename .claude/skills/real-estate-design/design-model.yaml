name: "Goodland Real Estate"
description: "Premium Philippine real estate design system. Warm tropical luxury meets clean professionalism. Inspired by Ayala Land, Megaworld, and warm-minimal editorial brands. Serif headings for elegance, sans-serif body for readability. Generous whitespace, warm cream backgrounds, deep emerald and gold accents."
philosophy: "Trust through taste. Filipino land buyers want to feel confidence and warmth — not cold corporate efficiency. The design breathes with warm off-white space, speaks with authoritative serif headings, and closes with warm gold accents. Every element earns its place."
primary_mode: "light"
brand_source: "Custom design model for Yoshi Labs fulfillment — real estate vertical"
brand_domain: "Real Estate — land buying and selling in the Philippines"
brand_type: "content-rich"
mono_for_code: false
mono_for_metrics: false

# ── PRIMITIVES ──────────────────────────────────────────
primitives:
  colors:
    neutral:
      50:  "#FAF8F4"    # warm off-white canvas
      100: "#F2EFE9"    # raised surface
      200: "#E5E0D8"    # borders, dividers
      300: "#C9C2B2"    # muted elements
      400: "#9A9284"    # secondary text
      500: "#6B645A"    # body text light
      600: "#4A453D"    # body text
      700: "#332F29"    # strong text
      800: "#221F1B"    # dark surfaces
      900: "#1A1714"    # primary text
      950: "#0D0B09"    # darkest
    brand:
      50:  "#EBF5EC"    # lightest green tint
      100: "#D4E8D6"
      200: "#A8D1AB"
      300: "#7CBA80"
      400: "#4F9E53"    # accent dark mode
      500: "#2D7D32"    # deep emerald — primary accent
      600: "#236427"
      700: "#1A4B1D"
      800: "#123314"
      900: "#091C0A"
    gold:
      50:  "#FBF6ED"
      100: "#F5EAD3"
      200: "#EBD5A7"
      300: "#D4A84E"    # warm gold accent
      400: "#C8963E"    # primary gold
      500: "#A67A2E"
      600: "#7D5C22"
      700: "#533E16"
    blue:
      50:  "#EFF6FF"
      100: "#DBEAFE"
      500: "#0071e3"    # WhatsApp/link blue
      700: "#1D4ED8"
  spacing: [0, 2, 4, 8, 12, 16, 20, 24, 32, 48, 64, 96, 128, 160]
  radii:   [0, 2, 4, 8, 12, 16, 20, 999]

# ── SEMANTIC TOKENS ─────────────────────────────────────
tokens:
  colors:
    light:
      background:     "{neutral.50}"
      surface1:       "{neutral.100}"
      surface2:       "{neutral.200}"
      surface3:       "{neutral.300}"
      border:         "{neutral.200}"
      border_visible: "{neutral.300}"
      text1:          "{neutral.900}"
      text2:          "{neutral.600}"
      text3:          "{neutral.500}"
      text4:          "{neutral.400}"
      accent:         "{brand.500}"
      accent_hover:   "{brand.600}"
      accent_subtle:  "{brand.100}"
      gold:           "{gold.400}"
      gold_subtle:    "{gold.100}"
      link:           "{blue.500}"

  radii:
    element:   2
    control:   4
    component: 8
    container: 12
    pill:      999

  typography:
    display:
      family: "DM Serif Display"
      fallback: "Libre Baskerville, Georgia, serif"
      size:   "clamp(2.5rem, 5vw, 4rem)"
      weight: 400
      line_height: 1.1
      letter_spacing: "0em"
    heading:
      family: "DM Serif Display"
      fallback: "Libre Baskerville, Georgia, serif"
      size:   "clamp(1.5rem, 3vw, 2rem)"
      weight: 400
      line_height: 1.2
      letter_spacing: "0em"
    body:
      family: "Inter"
      fallback: "DM Sans, system-ui, sans-serif"
      size:   "16px"
      weight: 400
      line_height: 1.7
      letter_spacing: "0em"
    label:
      family: "Inter"
      fallback: "DM Sans, system-ui, sans-serif"
      size:   "11px"
      weight: 500
      line_height: 1.4
      letter_spacing: "0.15em"
      transform: "uppercase"
    mono:
      family: "JetBrains Mono"
      fallback: "IBM Plex Mono, monospace"
      size:   "14px"
      weight: 400
      line_height: 1.5
      letter_spacing: "0em"

  spacing:
    page_x:    "clamp(1.5rem, 6vw, 6rem)"
    section_y: "clamp(4rem, 10vw, 8rem)"
    gap:       "2rem"
    max_width: "1200px"

  elevation:
    strategy: "layered"
    card:     "0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03)"
    raised:   "0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04)"
    float:    "0 4px 16px rgba(0,0,0,0.08), 0 16px 48px rgba(0,0,0,0.06)"

  motion:
    personality: "fluid"
    easing:      "cubic-bezier(0.16, 1, 0.3, 1)"
    duration_fast:   "150ms"
    duration_normal: "300ms"
    duration_slow:   "500ms"

  hero:
    preset: "editorial-photo"
    background:
      medium: "photography"
      treatment: "full-bleed property photo with warm dark overlay (rgba(26,23,20,0.55))"
    subject: "none"
    composition: "centered text over immersive imagery"
