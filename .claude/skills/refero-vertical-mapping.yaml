## Refero as Quality Layer (NOT Design System)
Even when NOT using a Refero style as the primary design system, 
Refero's dos/donts apply universally to all builds:
- "No saturated colors for backgrounds" (ElevenLabs)
- "Accent used sparingly — only on CTAs and active states" (Linear)
- "Generous whitespace. Content density that feels editorial" (Anthropic)
- "Subtle noise/grain overlay breaks flatness" (monopo-saigon)
- "Inset shadows instead of visible borders on light surfaces" (ElevenLabs)
- "Staggered reveals. Counters animate up. Buttons feel tactile." (All)

These are universal quality rules. Apply them to EVERY build regardless of industry.

