# Refero Style → Industry Mapping (HONEST — May 2026)

## What Refero Actually Is
22 design systems extracted from real tech company websites. 
Every single one is SaaS, developer tools, fintech, AI, or creative agencies.
Zero hospitality. Zero food. Zero beauty. Zero medical. Zero real estate.

## When to Use Refero
- Client is a tech company, SaaS, or startup
- Client is a creative/digital agency
- Client wants a tech-forward, systems-driven aesthetic
- Client explicitly chooses a style from the gallery

## When NOT to Use Refero
- Service businesses (salons, restaurants, dental clinics, vet clinics)
- Hospitality (hotels, B&Bs, STRs)
- Trade businesses (construction, repair, auto)
- Traditional professions (law firms, accounting firms)
- These industries use their own industry model's visual DNA instead

