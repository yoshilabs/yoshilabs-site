      hex: '#f54e00'
      role: Outlined action button borders and link text — a vibrant orange indicating
        inter
    - name: Chartreuse Alert
      hex: '#4ade80'
      role: supporting accents, small interactive text snippets — a vivid green for
        positive
    - name: Goldenrod Accent
      hex: '#c08532'
      role: Accent for specific interactive states or icons, often found in button
        backgroun
    - name: Forest Green Action
      hex: '#34785c'
      role: Specific button backgrounds/borders like 'View PR' — a moderate green
        for distin
  dos:
  - Use CursorGothic for all headings and primary UI text, applying precise letter-spacing
    values (e.g., -0.45px at 72px, -0.08px at 22px).
  - 'Elevate content with the multi-layered shadow token: rgba(0, 0, 0, 0.14) 0px
    28px 70px 0px, rgba(0, 0, 0, 0.1) 0px 14px 32px 0px, oklab(0.263084 -0.00230259
    0.0124794 / 0.1) 0px 0px 0px 1px.'
  - Apply Canvas Parchment (#f7f7f4) as the primary background for all major page
    sections and UI elements.
  - Reserve Onyx Outline (#f54e00) exclusively for outlined interactive elements or
    prominent link text to signal primary action.
  - Use 4px border-radius for most general rounded elements like cards and buttons,
    with 8px radius for more visually distinct components.
  donts:
  - Do not use solid background colors for primary call-to-action buttons; prefer
    bordered actions with Onyx Outline (#f54e00).
  - Avoid arbitrary shadow values; adhere strictly to the defined multi-layered shadow
    for all elevated cards and elements.
  - Never use purely achromatic grays for primary text or borders; always use Inkwell
    (#26251e) or Muted Stone (#7a7974).
  - Do not introduce new font families or weights beyond CursorGothic (400), Lato
    (400, 600), and berkeleyMono (400, 500).
  - Do not use the vivid accent color Onyx Outline (#f54e00) as a background fill
    for any component.
