  dos:
  - Use 'Pitch Black' (#08090a) for the primary page background to establish the dark
    theme.
  - Apply 'Porcelain' (#f7f8f8) for all primary text and important icons to ensure
    readability.
  - Highlight primary interactive elements exclusively with 'Neon Lime' (#e4f222)
    as a background, restricting its use to guide user attention.
  - Create depth and hierarchy by layering surfaces using 'Pitch Black' (#08090a),
    'Graphite' (#0f1011), and 'Deep Slate' (#161718) backgrounds.
  - Employ the Inter Variable font family with specific letter-spacing adjustments
    for all UI text, such as -0.22px for display sizes and -0.11px for body text,
    to maintain a tight, precise feel.
  donts:
  - Do not introduce additional bright or saturated colors beyond 'Neon Lime' (#e4f222)
    for interactive elements; maintain its singular role.
  - Avoid using harsh white backgrounds or light-themed patterns, as the system is
    anchored in a dark mode aesthetic.
  - Do not deviate from the specified typeface choices; 'Inter Variable' and 'Berkeley
    Mono' are fundamental to the visual identity.
  - Refrain from using strong, diffuse shadows; elevation is achieved through subtle
    layering and sharp, contained shadows like rgba(0, 0, 0, 0.4) 0px 2px 4px 0px.
  - Do not apply broad, decorative background gradients across large sections of the
    UI; gradients are subtle and contained to specific functional areas.
