      hex: '#3d75d8'
      role: Logo mark conic gradient — the spinning blue-cyan wheel that is the ElevenLabs
        l
  dos:
  - Use Waldenburg 300 with -0.02em letter-spacing for all headings at 32px and above
    — never substitute a heavier weight.
  - Apply 9999px border-radius to every button and pill tag; use 16-20px for cards
    and panels; use 0px for bare input fields.
  - 'Keep the entire color palette at near-zero saturation: #000000 text, #fdfcfc
    background, #e5e5e5 borders, #777169 secondary text. Reserve #ff4704 and #0447ff
    for product avatar dots only.'
  - Use the inset shadow rgba(0,0,0,0.075) 0px 0px 0px 0.5px inset on white UI surfaces
    that sit on eggshell — it replaces border outlines on cards without adding visual
    weight.
  - Use Geist Mono 400 13px only for machine-generated or technical inline annotations
    (e.g. [whispers], [sarcastic]) and code snippets.
  donts:
  - Never use a weight above 300 for Waldenburg display headlines — weight 700 belongs
    only to WaldenburgFH product-label contexts at 14px.
  - 'Never introduce saturated color for text, background fills, or buttons — the
    Signal Blue #0447ff and Ember #ff4704 are reserved exclusively for 8-16px avatar/dot
    indicators.'
  - Never apply box-shadow elevation larger than rgba(0,0,0,0.4) 0px 0px 1.143px —
    ElevenLabs cards float by 1px shadow, not by depth layering.
  - 'Never use a pure white #ffffff background for page surfaces — use #fdfcfc (Eggshell)
    for all base surfaces to preserve the warm papery ground.'
  - Never place Inter body text below 13px in product UI contexts or below 14px in
    marketing prose — the 0.01em tracking needs minimum size to work.
