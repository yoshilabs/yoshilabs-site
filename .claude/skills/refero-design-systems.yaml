        wit
    - name: Muted Stone
      hex: '#7a7974'
      role: 'Secondary text, subtle borders, icon fills — a mid-tone gray for less
        prominent '
    - name: Deep Shadow
      hex: '#141414'
      role: Deepest text variant — for maximum contrast on headlines or critical information
    - name: Pebble Gray
